<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Пион — переехал на wedding.zimermans.ru</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://wedding.zimermans.ru/" />
  <meta http-equiv="refresh" content="0; url=https://wedding.zimermans.ru/" />
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;
      background:#fcf8f2;color:#5a5149;
      font-family:Georgia,'Times New Roman',serif;text-align:center;padding:24px}
    .b{max-width:440px}
    h1{font-size:2.4rem;margin:0 0 10px;color:#433b33}
    p{font-size:1.05rem;line-height:1.6;color:#8a7d70;margin:0 0 22px}
    a{display:inline-block;padding:13px 26px;border-radius:4px;
      background:#fffdf9;color:#433b33;text-decoration:none;
      border:1px solid rgba(191,159,98,.6);
      box-shadow:inset 0 0 0 4px #fffdf9,inset 0 0 0 5px rgba(191,159,98,.36),
        0 16px 34px -22px rgba(120,86,54,.5)}
  </style>
  <script>
    // Снимаем старый service worker и кэш, чтобы вернувшиеся гости не залипали
    // на старой версии, и уводим на новый адрес.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      });
      if (window.caches && caches.keys) {
        caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
      }
    }
    location.replace('https://wedding.zimermans.ru/');
  </script>
</head>
<body>
  <div class="b">
    <h1>Пион переехал</h1>
    <p>Приложение вашей свадьбы теперь живёт по новому адресу.</p>
    <a href="https://wedding.zimermans.ru/">Перейти на Пион&nbsp;→</a>
  </div>
</body>
</html>
